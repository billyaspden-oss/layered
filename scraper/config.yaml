# Search tuning. Edit freely — no code changes needed.
#
# Bluesky queries are sent as exact phrases (Lucene quoted-string syntax).
# Keep them SHORT (2-5 words) and conversational — they need to match
# what someone would actually type in a social post, not a formal sentence.

queries:
  # Direct hire intent
  - "looking for a web designer"
  - "need a web designer"
  - "hire a web designer"
  - "recommend a web designer"
  - "anyone recommend a web designer"
  - "web designer wanted"
  # Website need — business owner framing
  - "need a website for my"
  - "website for my business"
  - "website for my shop"
  - "build me a website"
  - "getting a website made"
  - "need to get a website"
  - "new website for my business"
  # Price-shopping
  - "how much does a website"
  - "how much for a website"
  - "web design quote"

# Freelancer.com uses keyword search (not exact phrase).
# These are used instead of the Bluesky queries above when searching Freelancer.
# Broader terms work better here since every result is already an active RFP.
freelancer_queries:
  - "website design"
  - "web design"
  - "wordpress website"
  - "small business website"
  - "company website"
  - "business website"
  - "landing page"
  - "website build"
  - "website redesign"

# Only consider posts from the last N hours.
lookback_hours: 72

# Max posts to pull per query per source per run.
limit_per_query: 25

# Minimum classifier confidence to keep a lead (0.0-1.0).
min_confidence: 0.70

# Second LLM pass: for each kept lead, score it against the business_context
# below as an ICP (QUALIFIED/DISQUALIFIED) and draft a short, ready-to-send
# outreach reply. Results land in the icp_status / icp_reasoning /
# outreach_hook / outreach_message columns of leads.csv and in the email
# digest. Set to false to skip it (saves one Haiku call per kept lead).
outreach_enabled: true

# Toggle sources on/off without touching code.
bluesky_enabled: true
hackernews_enabled: false
freelancer_enabled: true

# LinkedIn is OUTBOUND prospecting, not inbound intent: it searches a paid
# third-party data API for profiles matching your ICP, skips the intent
# classifier, and keeps only profiles the scorer marks QUALIFIED (with a
# LinkedIn connection-request note drafted for each). Off by default because
# it needs a paid provider + API key.
#
# LinkedIn has no usable public API and scraping it directly breaks their ToS,
# so you must subscribe to a provider (e.g. a RapidAPI-hosted "LinkedIn Data
# API" or a Proxycurl-style service) and set the RAPIDAPI_KEY secret.
linkedin_enabled: false

linkedin:
  # Host of the RapidAPI-hosted provider you subscribed to (no https://).
  api_host: "linkedin-data-api.p.rapidapi.com"
  # Provider's people-search endpoint path.
  search_path: "/search-people"
  # Filters sent as query params. Param NAMES vary by provider — check your
  # provider's docs and adjust these keys to match.
  search_params:
    keywords: "founder OR owner OR director"
    title: "founder, owner, managing director"
    geo: "United Kingdom"
  # Max profiles to pull per run.
  limit: 25

# Optional: a distinct ICP for LinkedIn outbound scoring. If unset, the scorer
# falls back to business_context below. Use this to target by role/firmographics
# (the people you'd cold-message) rather than inbound "wants a website" signals.
# linkedin_icp: |
#   Owners, founders, or marketing leads at UK small businesses and local
#   service companies (1-50 staff) whose current site looks dated or DIY.
#   Not enterprises, not agencies, not people selling their own web services.

# Description of who you are — used by the classifier to judge fit.
business_context: |
  We're a small web design agency that builds modern marketing sites
  for small businesses, tradespeople, and local service companies in the UK.
  Typical engagement: a 3-10 page site, £500-£3000, delivered in 1-3 weeks.
  We're looking for clients who want someone to design or build their website —
  not enterprise/complex platforms, not pure dev tasks (no web scraping, no
  apps), not people offering their own services.
